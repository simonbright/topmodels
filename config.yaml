# Top Models pipeline — weights and source toggles (committed; no secrets here)
top_n: 10

# Small-data preset: search-led, problems secondary, first-party gated until volume arrives
weights:
  search: 0.55
  problems: 0.40
  first_party: 0.05
  listings: 0.0
  community: 0.0

calibration:
  min_first_party_scans: 5
  min_sample_by_signal:
    first_party: 5
    problems: 0
  activation_threshold:
    first_party_total_scans: 50
  shrinkage_prior: 1.0

sources:
  nhtsa: true
  trends: true
  firstparty: true
  reports: true
  reddit: false
  keywordplanner: false
  marketcheck: false

budget:
  max_paid_calls: 0

model_year_window:
  min_years_ago: 3
  max_years_ago: 12

firstparty:
  export_path: "data/sample_telemetry_export.json"
  exclude_demo: true

trends:
  geo: "US"
  timeframe: "today 12-m"
  request_pause_sec: 2.0

nhtsa:
  request_pause_sec: 0.35
  max_complaints_per_model: 500

reports:
  curated_path: "data/curated_reports.json"

cache_dir: "cache"
output_dir: "out"
